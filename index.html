.art-item{border-bottom:0.5px solid var(--border);cursor:pointer;}.art-item:last-child{border-bottom:none;}.art-header{padding:14px 1.5rem;display:flex;align-items:flex-start;gap:12px;transition:background .2s;}.art-header:hover{background:var(--bg);}.art-item.open .art-header{background:var(--bg);}.art-num{min-width:60px;height:32px;border-radius:var(--rsm);background:var(--orange-bg);color:var(--orange-text);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}.art-title-text{flex:1;font-size:14px;font-weight:500;line-height:1.5;}.art-badge{font-size:10px;padding:2px 8px;border-radius:12px;margin-left:8px;white-space:nowrap;}.badge-important{background:var(--red-bg);color:var(--red-text);}.badge-frequent{background:var(--amber-bg);color:var(--amber-text);}.badge-basic{background:var(--teal-bg);color:var(--teal-text);}.art-arrow{font-size:12px;color:var(--text3);margin-left:auto;transition:transform .2s;}.art-item.open .art-arrow{transform:rotate(90deg);}
.art-detail{display:none;padding:0 1.5rem 20px 80px;background:var(--bg);}.art-item.open .art-detail{display:block;}.art-text{background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}.art-text-header{padding:12px 16px;background:var(--orange-bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}.art-text-title{font-size:13px;font-weight:600;color:var(--orange-text);}.art-links{display:flex;gap:6px;}.egov-link,.api-link{font-size:11px;padding:4px 8px;border-radius:4px;text-decoration:none;transition:all .2s;color:white;}.egov-link{background:var(--blue);}.egov-link:hover{background:#1e40af;}.api-link{background:var(--orange);}.api-link:hover{background:var(--orange-dark);}.art-text-body{padding:16px;font-family:'Hiragino Mincho ProN','Yu Mincho','serif';font-size:13px;line-height:1.8;white-space:pre-line;color:var(--text);}
.explanations{display:flex;flex-direction:column;gap:12px;}.exp-item{border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden;}.exp-header{padding:10px 14px;font-size:11px;font-weight:600;}.exp-body{padding:14px;font-size:13px;line-height:1.7;}.exp-practical{background:var(--surface);}.exp-practical .exp-header{background:var(--orange-bg);color:var(--orange-text);}.exp-beginner{background:var(--teal-bg);}.exp-beginner .exp-header{color:var(--teal-text);}.exp-exam{background:var(--amber-bg);}.exp-exam .exp-header{color:var(--amber-text);}
.no-results{padding:4rem 2rem;text-align:center;color:var(--text3);font-size:15px;}.footer{margin-top:3rem;padding:2rem 1.25rem;border-top:1px solid var(--border);background:var(--bg2);text-align:center;}.footer-content{max-width:1200px;margin:0 auto;font-size:12px;color:var(--text3);line-height:1.6;}

<script>const D=[{"id":"overview","title":"総則","desc":"目的・基本的理念・定義（第1条～第3条）","groups":[{"title":"総則（第1条～第3条）","articles":[{"num":"1","title":"目的","importance":"important","text":"（目的）\n第一条　この法律は、労働者又はその被扶養者の業務災害（労働者災害補償保険法第7条第1項第1号に規定する業務災害をいう。）以外の疾病、負傷若しくは死亡又は出産に関して保険給付を行い、もって国民の生活の安定と福祉の向上に寄与することを目的とする。","practical":"健康保険法の根幹規定。業務災害以外の疾病・負傷・死亡・出産が対象。業務災害は労災保険法の管轄。","beginner":"会社で働く人やその家族が、仕事以外のケガや病気、死亡、出産をした場合に保険で保障する法律です。","exam":"「業務災害以外」が対象。目的条文の穴埋め問題に注意。"},{"num":"2","title":"基本的理念","importance":"frequent","text":"（基本的理念）\n第二条　健康保険制度については、これが医療保険制度の基本をなすものであることにかんがみ、高齢化の進展、疾病構造の変化、社会経済情勢の変化等に対応し、医療保険の運営の効率化、給付の内容及び費用の負担の適正化並びに国民が受ける医療の質の向上を総合的に図りつつ、実施されなければならない。","practical":"平成14年改正で新設。「医療保険制度の基本」を宣言。効率化・適正化・質の向上の3目標。","beginner":"健康保険は日本の医療保険の中心。効率的な運営、適切な給付と負担、医療の質向上を同時に実現すべき理念。","exam":"「医療保険制度の基本」、3目標を総合的に図る点が出題ポイント。"},{"num":"3","title":"定義","importance":"important","text":"（定義）\n第三条\n１　被保険者＝適用事業所に使用される者＋任意継続被保険者。適用除外9号あり。\n３　適用事業所＝法定16業種で常時5人以上、又は国・地方公共団体・法人の事業所。\n４　任意継続被保険者＝資格喪失日の前日まで継続して2月以上被保険者であった者。\n５　報酬＝労働の対償。臨時・3月超期間ごとのものを除く。\n６　賞与＝3月を超える期間ごとに受けるもの。\n７　被扶養者＝直系尊属・配偶者・子・孫・兄弟姉妹で生計維持されるもの等。\n８　日雇労働者の定義。\n９　賃金の定義。\n10　共済組合の定義。","practical":"中核的定義規定。適用除外9号、適用事業所（16業種・5人以上）、任意継続（2月以上）、報酬と賞与の区分（3月超）、被扶養者の範囲（同居要件有無）が重要。","beginner":"被保険者・適用事業所・任意継続・報酬・賞与・被扶養者等の定義。試験で最も重要な条文の一つ。","exam":"超頻出。適用除外9号、任意継続「2月以上」、報酬・賞与の区分、被扶養者の同居要件を完全暗記。"}]}]},{"id":"insurer","title":"保険者","desc":"全国健康保険協会・健康保険組合（第4条～第30条）","groups":[{"title":"通則（第4条～第7条）","articles":[{"num":"4","title":"保険者","importance":"important","text":"第四条　健康保険の保険者は、全国健康保険協会及び健康保険組合とする。","practical":"保険者は「協会けんぽ」と「健保組合」の2種類。日雇特例被保険者の保険は第123条で協会。","beginner":"保険者は①協会けんぽ（中小企業）②健保組合（大企業）の2つ。","exam":"保険者が2つである点は基本。"},{"num":"5","title":"協会管掌健康保険","importance":"important","text":"第五条　協会は、健保組合の組合員でない被保険者の保険を管掌する。\n２　資格確認・標準報酬決定・保険料徴収（任意継続除く）は厚生労働大臣が行う。","practical":"業務分担：資格・標準報酬・保険料徴収→厚生労働大臣、保険給付・保健事業→協会。任意継続の保険料徴収は協会。","beginner":"協会けんぽの業務は厚生労働大臣（年金機構）と分担。","exam":"業務分担、特に任意継続の保険料徴収が「協会」である点は頻出。"},{"num":"6","title":"組合管掌健康保険","importance":"basic","text":"第六条　健康保険組合は、その組合員である被保険者の保険を管掌する。","practical":"健保組合の管掌範囲。組合員＝被保険者の保険を管掌。","beginner":"健保組合は自分の組合員（従業員）の保険を運営。","exam":"基本事項。"},{"num":"7","title":"二以上の事業所に使用される者の保険者","importance":"frequent","text":"第七条　同時に二以上の事業所に使用される被保険者の保険を管掌する者は、厚生労働省令で定めるところによる。","practical":"複数事業所に使用される場合の保険者の決定方法。被保険者が選択届を提出。","beginner":"複数の会社で同時に働く場合、どちらの保険者になるかは届出で決めます。","exam":"選択届の仕組みを理解。"}]},{"title":"全国健康保険協会（第7条の2～第7条の42）","articles":[{"num":"7の2","title":"設立及び業務","importance":"frequent","text":"第七条の二　協会は、被保険者に係る健康保険事業を行うため設けられる。業務は保険給付・保健事業・福祉事業等。","practical":"協会の設立根拠と業務範囲。保険給付、保健事業、福祉事業、日雇特例被保険者の保険等。","beginner":"協会けんぽの組織と業務の根拠規定。","exam":"協会の業務範囲を理解。"},{"num":"7の3","title":"法人格","importance":"basic","text":"第七条の三　協会は、法人とする。","practical":"協会は法人格を有する。","beginner":"協会けんぽは法人（組織体）です。","exam":"基本事項。"},{"num":"7の9","title":"役員","importance":"basic","text":"第七条の九　協会に、理事長1人、理事6人以内及び監事2人を置く。","practical":"役員構成：理事長1人、理事6人以内、監事2人。","beginner":"協会の役員は理事長1人、理事6人まで、監事2人。","exam":"役員の人数を暗記。"},{"num":"7の11","title":"役員の任命","importance":"basic","text":"第七条の十一　理事長及び監事は厚生労働大臣が任命。理事は理事長が任命。","practical":"理事長・監事→大臣任命、理事→理事長任命。","beginner":"理事長と監事は大臣が任命、理事は理事長が任命。","exam":"任命権者の違いを理解。"},{"num":"7の18","title":"運営委員会","importance":"frequent","text":"第七条の十八　協会に運営委員会を置く。委員は9人以内。事業主・被保険者・学識経験者から各同数を厚生労働大臣が任命。","practical":"運営委員会は事業主・被保険者・学識経験者の三者構成。各同数、大臣任命。","beginner":"協会の運営に関する重要事項を決める委員会。事業主・従業員・有識者で構成。","exam":"委員の構成（三者構成・各同数・9人以内）は頻出。"},{"num":"7の37","title":"秘密保持義務","importance":"frequent","text":"第七条の三十七　協会の役員・職員等は、健康保険事業に関して職務上知り得た秘密を正当な理由なく漏らしてはならない。","practical":"秘密保持義務。違反は罰則（第207条の2）。","beginner":"協会の役職員は仕事で知った秘密を漏らしてはいけません。","exam":"秘密保持義務と罰則の関係を理解。"}]},{"title":"健康保険組合（第8条～第30条）","articles":[{"num":"8","title":"組織","importance":"frequent","text":"第八条　健保組合は、事業主・被保険者・任意継続被保険者をもって組織する。","practical":"組合員＝事業主＋被保険者＋任意継続被保険者。被扶養者は組合員でない。","beginner":"健保組合は事業主と従業員で構成。","exam":"組合員の範囲（被扶養者は含まない）は基本。"},{"num":"9","title":"法人格","importance":"basic","text":"第九条　健保組合は、法人とする。","practical":"健保組合は法人格を有する。","beginner":"健保組合は法人です。","exam":"基本事項。"},{"num":"11","title":"設立","importance":"important","text":"第十一条　常時政令で定める数以上の被保険者を使用する事業主は、健保組合を設立できる。\n２　共同設立も可能。","practical":"単独設立：700人以上、共同設立：3,000人以上。","beginner":"設立要件：1社700人以上、複数社3,000人以上。","exam":"被保険者数要件は頻出。"},{"num":"12","title":"設立の手続","importance":"frequent","text":"第十二条　事業主は、被保険者の2分の1以上の同意を得て、規約を作り、厚生労働大臣の認可を受ける。","practical":"設立には被保険者の2分の1以上の同意＋規約作成＋大臣認可が必要。","beginner":"設立には従業員の半数以上の同意と大臣の認可が必要。","exam":"「2分の1以上の同意」は頻出。"},{"num":"16","title":"規約","importance":"basic","text":"第十六条　健保組合は規約で10事項を定めなければならない。規約の変更は大臣認可が必要。","practical":"規約の記載事項10号。変更は原則大臣認可。","beginner":"健保組合の運営ルール（規約）には10の必須記載事項がある。","exam":"規約の記載事項と変更手続を理解。"},{"num":"18","title":"組合会","importance":"frequent","text":"第十八条　健保組合に組合会を置く。議員は偶数で、事業主選定と被保険者互選が各半数。","practical":"組合会議員は偶数で、事業主側と被保険者側が半数ずつ。公平性の確保。","beginner":"健保組合の意思決定機関。事業主側と従業員側が同数。","exam":"組合会議員の構成（偶数・各半数）は頻出。"},{"num":"21","title":"役員","importance":"basic","text":"第二十一条　理事（偶数）及び監事を置く。理事長は事業主側理事から選挙。","practical":"理事は偶数で各側半数。理事長は事業主側理事から選挙。監事は各側1人。","beginner":"役員は理事と監事。理事長は事業主側から選ばれる。","exam":"理事長の選出方法を理解。"},{"num":"23","title":"合併","importance":"frequent","text":"第二十三条　合併には組合会議員の定数の4分の3以上の多数による議決と大臣認可が必要。","practical":"合併要件：4分の3以上の議決＋大臣認可。消滅組合の権利義務は存続組合が承継。","beginner":"合併には4分の3以上の議決と大臣の認可が必要。","exam":"「4分の3以上」は解散・分割と同じ。"},{"num":"24","title":"分割","importance":"basic","text":"第二十四条　分割も4分の3以上の議決と大臣認可が必要。","practical":"分割要件は合併と同じ。設立事業所単位での分割のみ可能。","beginner":"分割も合併と同じく4分の3以上の議決が必要。","exam":"分割の要件を理解。"},{"num":"26","title":"解散","importance":"important","text":"第二十六条　解散事由：①4分の3以上の議決、②事業継続不能、③解散命令。\n４　協会が権利義務を承継。","practical":"解散3事由。権利義務は協会が承継。","beginner":"解散：①4分の3の議決、②事業不能、③命令。協会が引継ぎ。","exam":"「4分の3以上」と権利義務の承継先は頻出。"},{"num":"29","title":"報告の徴収等・解散命令","importance":"basic","text":"第二十九条　厚生労働大臣は健保組合に報告徴収・検査可能。命令違反等の場合は解散命令可。","practical":"大臣の監督権限。命令違反時の解散命令権。","beginner":"大臣は健保組合を監督でき、問題がある場合は解散命令を出せる。","exam":"監督権限と解散命令の関係を理解。"},{"num":"53","title":"付加給付","importance":"important","text":"第五十三条　健保組合は、規約で定めるところにより、法定給付に併せてその他の給付（付加給付）を行うことができる。","practical":"付加給付は健保組合のみの制度。協会けんぽにはない。規約で定める。","beginner":"健保組合は法律で決められた給付に加えて、独自の上乗せ給付ができます。","exam":"付加給付は「健保組合のみ」。協会けんぽとの違いは頻出。"}]}]},{"id":"insured","title":"被保険者","desc":"資格・標準報酬月額・届出等（第31条～第51条の2）","groups":[{"title":"適用事業所（第31条～第34条）","articles":[{"num":"31","title":"任意適用事業所","importance":"important","text":"第三十一条　適用事業所以外の事業所の事業主は、厚生労働大臣の認可を受けて適用事業所とできる。\n２　被保険者となるべき者の2分の1以上の同意が必要。","practical":"任意適用事業所の手続：被保険者の2分の1以上の同意＋大臣認可。","beginner":"法定の適用事業所でなくても、従業員の半数以上が同意すれば加入できます。","exam":"「2分の1以上の同意」は頻出。"},{"num":"33","title":"任意適用の取消し","importance":"frequent","text":"第三十三条　事業主は大臣認可を受けて適用事業所でなくすことができる。被保険者の4分の3以上の同意が必要。","practical":"取消しには被保険者の4分の3以上の同意＋大臣認可。設立より厳しい要件。","beginner":"適用を取り消すには、従業員の4分の3以上の同意と大臣の認可が必要。","exam":"設立「2分の1」vs取消し「4分の3」の違いは頻出。"},{"num":"34","title":"一括適用","importance":"basic","text":"第三十四条　同一事業主の二以上の適用事業所は、大臣承認で一の適用事業所とできる。","practical":"一括適用の承認制度。事業主が同一であることが要件。","beginner":"同じ会社の複数事業所をまとめて1つの事業所として扱えます。","exam":"一括適用の要件を理解。"}]},{"title":"資格の得喪（第35条～第39条）","articles":[{"num":"35","title":"資格取得の時期","importance":"important","text":"第三十五条　被保険者は、適用事業所に使用されるに至った日等から資格を取得する。","practical":"資格取得は「当日」。3パターン：①使用された日②適用事業所になった日③適用除外でなくなった日。","beginner":"資格取得は入社日等の当日から。","exam":"資格取得は「当日」。3パターンを正確に。"},{"num":"36","title":"資格喪失の時期","importance":"important","text":"第三十六条　被保険者は、死亡・退職等に該当した日の翌日（同日再取得なら当日）から喪失。\n一 死亡　二 退職　三 適用除外該当　四 任意適用取消し","practical":"喪失は原則「翌日」。同日再取得なら「当日」。4事由。","beginner":"資格喪失は事由発生の翌日。同日に別会社に入ればその日。","exam":"「翌日喪失」「同日再取得なら当日」は超頻出。"},{"num":"37","title":"任意継続被保険者","importance":"important","text":"第三十七条　申出は資格喪失日から20日以内。正当理由あれば経過後も受理可。\n２　初回保険料の未納は資格取得否定。","practical":"20日以内の申出。正当理由で経過後受理。初回保険料未納→資格取得否定。","beginner":"退職後20日以内に申出。初回保険料未納は加入不可。","exam":"「20日以内」、初回保険料未納の効果は超頻出。"},{"num":"38","title":"任意継続の資格喪失","importance":"important","text":"第三十八条　喪失事由6つ。1～3号は翌日喪失、4～6号は当日喪失。\n一 2年経過　二 死亡　三 保険料未納　四 被保険者資格取得　五 船員保険加入　六 後期高齢者医療加入","practical":"6事由。翌日/当日の区分が重要。2年の期間制限。","beginner":"任意継続終了：①2年②死亡③保険料未納④再就職⑤船員保険⑥後期高齢者。","exam":"6事由と翌日/当日の区分は超頻出。"},{"num":"39","title":"資格の得喪の確認","importance":"important","text":"第三十九条　資格の得喪は保険者等の確認で効力発生。ただし任意適用取消し・任意継続の得喪は確認不要。","practical":"確認が効力発生要件。例外あり。届出・請求・職権で実施。","beginner":"資格の得喪は保険者等の確認で有効に。任意継続は確認不要。","exam":"「確認」が効力発生要件、例外は頻出。"}]},{"title":"標準報酬月額・標準賞与額（第40条～第47条）","articles":[{"num":"40","title":"標準報酬月額","importance":"important","text":"第四十条　第1級58,000円～第50級1,390,000円の50等級。最高等級が1.5%超で等級追加可能（0.5%下限）。","practical":"50等級。厚生年金（32等級・650,000円上限）との違い。最高等級の自動調整。","beginner":"標準報酬月額は50段階。58,000円～1,390,000円。","exam":"50等級・上限1,390,000円は超頻出。厚生年金との比較。"},{"num":"41","title":"定時決定","importance":"important","text":"第四十一条　毎年7月1日現在で4～6月の報酬平均で決定。9月～翌8月適用。17日未満の月は除外。","practical":"7月1日基準。4～6月報酬。9月～翌8月。17日未満除外。6/1～7/1取得者等は除外。","beginner":"毎年4～6月の平均で決め直し、9月から翌8月まで使用。","exam":"「7月1日」「4～6月」「9月～翌8月」「17日未満」は超頻出。"},{"num":"42","title":"資格取得時の決定","importance":"frequent","text":"第四十二条　資格取得者の標準報酬月額は、報酬の種類に応じた4つの方法で算定。取得月から8月（6/1～12/31取得は翌年8月）まで適用。","practical":"取得時決定の4つの算定方法。適用期間は取得月～8月（6月以降取得は翌年8月）。","beginner":"入社時の標準報酬月額は給料の種類に応じて計算。","exam":"適用期間の計算は頻出。"},{"num":"43","title":"随時改定","importance":"important","text":"第四十三条　継続3月（各月17日以上）で報酬が著しく高低を生じた場合に改定。","practical":"3要件：①固定的賃金変動②3月連続17日以上③2等級以上差。","beginner":"給料が大きく変わった場合に変更（2等級以上差）。","exam":"随時改定の3要件は超頻出。"},{"num":"43の2","title":"育児休業等終了時の改定","importance":"frequent","text":"第四十三条の二　育児休業等終了後、3歳未満の子を養育する場合に申出により改定。","practical":"育休終了後の改定特例。3歳未満の子の養育が条件。定時決定によらない改定。","beginner":"育休から復帰して給料が下がった場合、申出により標準報酬月額を変更できます。","exam":"育休終了時改定の要件（3歳未満の子の養育）は頻出。"},{"num":"43の3","title":"産前産後休業終了時の改定","importance":"frequent","text":"第四十三条の三　産前産後休業終了後、子を養育する場合に申出により改定。","practical":"産休終了後の改定特例。育休終了時改定と同様の仕組み。","beginner":"産休から復帰して給料が下がった場合にも改定可能。","exam":"産休終了時改定と育休終了時改定の違いを理解。"},{"num":"44","title":"報酬月額の算定の特例","importance":"basic","text":"第四十四条　通常の方法で算定困難又は著しく不当な場合の特例。二以上事業所の場合は合算。","practical":"算定困難・著しく不当な場合の特例。二以上事業所は合算。","beginner":"通常の方法で計算できない場合の特別ルール。","exam":"特例の適用場面を理解。"},{"num":"45","title":"標準賞与額の決定","importance":"important","text":"第四十五条　1000円未満切捨て。年度累計573万円上限。","practical":"1000円未満切捨て。年度（4月～翌3月）累計573万円。厚生年金は月150万円上限。","beginner":"ボーナスの1000円未満切捨て。年間合計573万円まで。","exam":"年度累計「573万円」は超頻出。"},{"num":"46","title":"現物給与の価額","importance":"basic","text":"第四十六条　通貨以外で支払われる場合の価額は、厚生労働大臣が定める。健保組合は規約で別段の定め可。","practical":"現物給与の価額は大臣が決定。健保組合は規約で別に定められる。","beginner":"食事や住居などの現物支給がある場合の価額の決め方。","exam":"現物給与の価額の決定方法を理解。"},{"num":"47","title":"任意継続被保険者の標準報酬月額","importance":"frequent","text":"第四十七条　①退職時の額と②全被保険者平均額のいずれか少ない額。","practical":"2つの額の「いずれか少ない額」。健保組合は規約で別に定めること可能。","beginner":"退職時の額と全加入者の平均額の低い方。","exam":"「いずれか少ない額」は頻出。"}]},{"title":"届出等（第48条～第51条の2）","articles":[{"num":"48","title":"届出","importance":"important","text":"第四十八条　事業主は、被保険者の資格の取得・喪失、報酬月額・賞与額に関する事項を届け出なければならない。","practical":"事業主の届出義務。資格得喪・報酬月額・賞与額の4事項。届出懈怠は罰則（第208条）。","beginner":"事業主は従業員の資格や給料に関する届出をする義務があります。","exam":"届出義務の内容と罰則を理解。"},{"num":"49","title":"通知","importance":"basic","text":"第四十九条　保険者等は確認・標準報酬の決定等を事業主に通知。事業主は被保険者に通知。","practical":"確認・標準報酬決定の通知義務。保険者等→事業主→被保険者の流れ。","beginner":"保険者から事業主へ、事業主から従業員へ通知する仕組み。","exam":"通知の流れを理解。"},{"num":"51","title":"確認の請求","importance":"frequent","text":"第五十一条　被保険者又は被保険者であった者は、いつでも確認を請求できる。","practical":"被保険者の確認請求権。「いつでも」請求可能。時効なし。","beginner":"被保険者はいつでも資格の確認を求めることができます。","exam":"「いつでも」請求できる点が重要。"}]}]},{"id":"benefit_general","title":"保険給付 通則","desc":"給付の種類・調整・受給権の保護（第52条～第62条）","groups":[{"title":"通則（第52条～第62条）","articles":[{"num":"52","title":"保険給付の種類","importance":"important","text":"第五十二条　保険給付9種類：①療養の給付等②傷病手当金③埋葬料④出産育児一時金⑤出産手当金⑥家族療養費等⑦家族埋葬料⑧家族出産育児一時金⑨高額療養費等","practical":"9種類の保険給付。本人と被扶養者の対応関係が重要。","beginner":"健康保険の給付は9種類。治療・手当金・一時金等。","exam":"9種類を正確に暗記。"},{"num":"53","title":"付加給付","importance":"important","text":"第五十三条　健保組合は規約で、法定給付に併せてその他の給付を行うことができる。","practical":"付加給付は健保組合のみ。協会けんぽにはない。","beginner":"健保組合だけが独自の上乗せ給付（付加給付）を行える。","exam":"「健保組合のみ」は頻出。"},{"num":"53の2","title":"法人役員の保険給付の特例","importance":"frequent","text":"第五十三条の二　法人の役員としての業務に起因する疾病等に関して保険給付は行わない（被保険者数5人未満の事業所の役員を除く）。","practical":"法人役員の業務上災害は原則給付対象外。5人未満の事業所の役員は例外的に対象。","beginner":"法人の役員が仕事中にケガ等をした場合は原則として保険給付の対象外です。","exam":"法人役員の特例と5人未満の例外は頻出。"},{"num":"55","title":"他の法令による保険給付との調整","importance":"frequent","text":"第五十五条　労災・公務員災害補償・介護保険等と同一事由の場合は健保の給付は行わない。","practical":"労災保険・国公災・地公災との調整（1項）、介護保険との調整（2項）、国等の負担による療養との調整（3項）。","beginner":"労災や介護保険で給付を受けられる場合は、健康保険からは給付しない。","exam":"各法令との調整関係は頻出。"},{"num":"57","title":"損害賠償請求権","importance":"frequent","text":"第五十七条　第三者行為による場合、保険者は給付の価額の限度で損害賠償請求権を代位取得。","practical":"第三者行為災害の代位取得と免責。","beginner":"交通事故等で他人に原因がある場合、保険者は加害者に求償できる。","exam":"代位取得と免責の仕組みは頻出。"},{"num":"58","title":"不正利得の徴収等","importance":"important","text":"第五十八条　不正受給者から徴収可。保険医療機関等の不正は返還＋40%加算金。","practical":"不正受給の徴収。保険医療機関の40%加算金。事業主・保険医の連帯納付命令。","beginner":"不正受給は返還。医療機関の不正は返還＋40%加算金。","exam":"「40%加算金」は頻出。"},{"num":"59","title":"文書の提出等","importance":"basic","text":"第五十九条　保険者は保険給付に関し必要なとき、受給者に文書の提出・提示を命じ、又は職員に質問・診断をさせることができる。","practical":"保険者の調査権限。文書提出命令・質問・診断。","beginner":"保険者は給付のために必要な調査ができます。","exam":"調査権限の範囲を理解。"},{"num":"61","title":"受給権の保護","importance":"important","text":"第六十一条　保険給付を受ける権利は、譲渡・担保・差押え不可。","practical":"受給権の3つの禁止。社会保険共通の規定。","beginner":"給付を受ける権利は譲渡・担保・差押えできない。","exam":"3つの禁止を理解。"},{"num":"62","title":"租税その他の公課の禁止","importance":"basic","text":"第六十二条　保険給付として支給を受けた金品を標準として課税できない。","practical":"保険給付の非課税。","beginner":"保険給付には税金がかからない。","exam":"非課税は基本事項。"}]}]},{"id":"medical","title":"療養の給付等","desc":"療養の給付・保険医療機関・療養費等（第63条～第97条）","groups":[{"title":"療養の給付（第63条～第75条の2）","articles":[{"num":"63","title":"療養の給付","importance":"important","text":"第六十三条　療養の給付5種類：①診察②薬剤・治療材料③処置・手術等④居宅療養⑤入院。\n含まれない療養：食事療養・生活療養・評価療養・患者申出療養・選定療養。","practical":"現物給付5種類と、含まれない5種類の区別が重要。保険医療機関の3類型。","beginner":"治療として5種類が保険適用。食事代・先進医療等は別の仕組み。","exam":"5種類の給付と含まれない5つの療養の区別は超頻出。"},{"num":"64","title":"保険医又は保険薬剤師","importance":"frequent","text":"第六十四条　保険医療機関の医師等は、厚生労働大臣の登録を受けた保険医又は保険薬剤師でなければならない。","practical":"保険医・保険薬剤師の登録制度。大臣登録が必要。","beginner":"健康保険で治療する医師は「保険医」として登録が必要。","exam":"保険医・保険薬剤師の登録制度を理解。"},{"num":"65","title":"保険医療機関の指定","importance":"frequent","text":"第六十五条　保険医療機関の指定は、病院等の開設者の申請により行う。指定拒否事由あり（3項6号）。","practical":"保険医療機関は開設者の申請による大臣指定。指定拒否事由6号。","beginner":"病院が保険診療を行うには、厚生労働大臣の指定が必要。","exam":"指定の仕組みと指定拒否事由を理解。"},{"num":"68","title":"指定の更新","importance":"basic","text":"第六十八条　保険医療機関の指定は6年で効力を失う。自動更新の仕組みあり。","practical":"指定の有効期間は6年。みなし更新の規定あり。","beginner":"指定は6年ごとに更新。通常は自動更新。","exam":"「6年」の有効期間は頻出。"},{"num":"70","title":"保険医療機関の責務","importance":"basic","text":"第七十条　保険医療機関は療養担当規則に従い療養の給付を担当しなければならない。","practical":"療養担当規則（保険医療機関及び保険医療養担当規則）の遵守義務。","beginner":"保険医療機関はルールに従って治療を行う義務がある。","exam":"療養担当規則の存在と役割を理解。"},{"num":"74","title":"一部負担金","importance":"important","text":"第七十四条\n一 70歳以前：3割\n二 70歳以後（一般）：2割\n三 70歳以後（現役並み所得）：3割","practical":"一部負担金の割合。70歳以前3割、70歳以上一般2割、現役並み3割。就学前は2割。","beginner":"自己負担：70歳未満3割、70歳以上一般2割、高収入3割。就学前2割。","exam":"一部負担金の割合は超頻出。"},{"num":"75の2","title":"一部負担金の額の特例","importance":"frequent","text":"第七十五条の二　災害等の特別事情がある被保険者に対し、一部負担金の減額・免除・徴収猶予が可能。","practical":"一部負担金の減額・免除・徴収猶予。災害等の特別事情が要件。","beginner":"災害等で支払困難な場合、自己負担を軽減する制度がある。","exam":"特別事情による一部負担金の特例を理解。"},{"num":"76","title":"療養の給付に関する費用","importance":"frequent","text":"第七十六条　費用は厚生労働大臣が定める算定方法による。審査支払は支払基金・国保連合会に委託可。","practical":"診療報酬点数表。審査支払の委託先（支払基金・国保連合会）。","beginner":"治療費は国が定めた基準で計算。支払は審査支払機関が代行。","exam":"診療報酬の算定、委託先は頻出。"}]},{"title":"保険医療機関の管理（第78条～第84条）","articles":[{"num":"78","title":"保険医療機関の報告等","importance":"basic","text":"第七十八条　厚生労働大臣は、保険医療機関等に報告・検査を命じることができる。","practical":"大臣の監督権限。報告命令・立入検査権。","beginner":"大臣は医療機関に対し報告や検査を求められる。","exam":"監督権限の範囲を理解。"},{"num":"80","title":"保険医療機関の指定の取消し","importance":"frequent","text":"第八十条　指定取消事由9号。療養担当規則違反、不正請求、虚偽報告等。","practical":"指定取消しの9事由。療養担当規則違反、不正請求等。","beginner":"不正等があった場合、保険医療機関の指定が取り消される。","exam":"取消事由の内容を理解。"},{"num":"82","title":"社会保険医療協議会への諮問","importance":"basic","text":"第八十二条　療養担当規則・診療報酬点数表を定めるときは中央社会保険医療協議会に諮問。","practical":"中医協への諮問事項。診療報酬改定等。","beginner":"診療報酬などのルールを決めるときは専門の会議に意見を聴く。","exam":"中医協の役割を理解。"}]},{"title":"入院時食事療養費等（第85条～第87条）","articles":[{"num":"85","title":"入院時食事療養費","importance":"important","text":"第八十五条　入院時の食事療養に要した費用について入院時食事療養費を支給。食事療養標準負担額を控除。","practical":"入院時の食事代。費用から食事療養標準負担額を控除した額を支給。","beginner":"入院中の食事代のうち、一定額（標準負担額）は自己負担で、残りが保険から支給。","exam":"食事療養標準負担額の仕組みは頻出。"},{"num":"85の2","title":"入院時生活療養費","importance":"frequent","text":"第八十五条の二　65歳以上の療養病床入院者の食事・居住費について入院時生活療養費を支給。","practical":"特定長期入院被保険者（65歳以上・療養病床）が対象。生活療養標準負担額を控除。","beginner":"65歳以上で療養病床に入院した場合の食事代と居住費の仕組み。","exam":"対象者（65歳以上・療養病床）を理解。"},{"num":"86","title":"保険外併用療養費","importance":"important","text":"第八十六条　評価療養・患者申出療養・選定療養を受けたときに支給。基礎的部分は保険で、上乗せ部分は自己負担。","practical":"保険外併用療養費の3類型（評価・患者申出・選定）。混合診療の例外的許容。","beginner":"先進医療や差額ベッド等を使った場合、基本の治療部分は保険適用。","exam":"3類型の区別は頻出。"},{"num":"87","title":"療養費","importance":"important","text":"第八十七条　保険者は、療養の給付が困難な場合等に療養費を支給できる。額は保険者が定める。","practical":"療養費は現金給付。保険医療機関以外での治療、柔道整復、海外療養等が対象。","beginner":"保険証を忘れた場合や接骨院での治療等、例外的に後から費用が戻る仕組み。","exam":"療養費の支給要件と対象を理解。"}]},{"title":"訪問看護療養費・移送費（第88条～第97条）","articles":[{"num":"88","title":"訪問看護療養費","importance":"frequent","text":"第八十八条　指定訪問看護事業者から指定訪問看護を受けたときに支給。自己負担は療養の給付と同じ。","practical":"訪問看護療養費の仕組み。指定訪問看護事業者制度。介護保険との調整。","beginner":"自宅で看護師等から療養の世話を受けた場合に支給。","exam":"訪問看護療養費と介護保険との調整は頻出。"},{"num":"89","title":"指定訪問看護事業者の指定","importance":"basic","text":"第八十九条　訪問看護事業者の指定は厚生労働大臣が行う。指定拒否事由8号。介護保険の指定とのみなし規定あり。","practical":"指定は大臣。介護保険の指定訪問看護事業者にはみなし指定。","beginner":"訪問看護事業者は大臣の指定が必要。介護保険の指定があれば自動で健保も指定。","exam":"みなし指定の仕組みを理解。"},{"num":"97","title":"移送費","importance":"basic","text":"第九十七条　療養のため病院等に移送されたときに支給。保険者が必要と認める場合に限る。","practical":"移送費は保険者の裁量。「必要と認める場合」に限定。","beginner":"緊急搬送等の費用が保険者の判断で支給される。","exam":"「必要と認める場合」に限定される点が重要。"}]}]},{"id":"cash","title":"傷病手当金等","desc":"傷病手当金・出産手当金・埋葬料・出産育児一時金（第99条～第114条）","groups":[{"title":"傷病手当金・埋葬料・出産関連（第99条～第109条）","articles":[{"num":"99","title":"傷病手当金","importance":"important","text":"第九十九条　被保険者（任意継続除く）が療養のため労務不能のとき、3日経過後から支給。\n額＝直近12月の標準報酬月額平均÷30×2/3。支給期間＝通算1年6月。","practical":"要件：①療養のため②労務不能③待期3日完成。支給額＝標準報酬日額の2/3。通算1年6月。","beginner":"病気やケガで休んだとき、4日目から給料の約2/3が支給。通算1年6ヶ月まで。","exam":"待期3日（連続）、支給額計算、通算1年6月は超頻出。"},{"num":"100","title":"埋葬料","importance":"important","text":"第百条　被保険者死亡時、生計維持者で埋葬を行う者に5万円。該当者なければ埋葬を行った者に5万円以内の実費。","practical":"埋葬料5万円。「生計維持＋埋葬を行う者」。該当者不在時は実費（5万円上限）。","beginner":"被保険者死亡時に5万円。受取人不在なら埋葬した人に実費。","exam":"5万円、支給対象者の区別は頻出。"},{"num":"101","title":"出産育児一時金","importance":"important","text":"第百一条　被保険者が出産したときは出産育児一時金として政令で定める金額を支給。","practical":"50万円。直接支払制度あり。","beginner":"出産時に50万円支給。","exam":"50万円は頻出。"},{"num":"102","title":"出産手当金","importance":"important","text":"第百二条　出産日以前42日（多胎98日）から出産日後56日の間の労務不能期間に支給。額は傷病手当金と同様。","practical":"産前42日（多胎98日）＋産後56日。支給額＝2/3。","beginner":"産前42日＋産後56日。給料の約2/3。","exam":"「42日」「98日」「56日」は超頻出。"},{"num":"103","title":"出産手当金と傷病手当金との調整","importance":"important","text":"第百三条　出産手当金支給期間は傷病手当金を支給しない。ただし出産手当金額が少ないときは差額支給。","practical":"出産手当金が優先。差額支給の仕組み。","beginner":"出産手当金と傷病手当金が重なる場合、出産手当金が優先。差額は支給。","exam":"出産手当金と傷病手当金の調整は頻出。"},{"num":"104","title":"継続給付","importance":"important","text":"第百四条　資格喪失日の前日まで引き続き1年以上被保険者で、喪失時に受給中の者は継続給付可。","practical":"要件：①継続1年以上②喪失時受給中。任意継続期間は含まない。同一保険者。","beginner":"退職前1年以上加入し、退職時に受給中なら引き続き受給可。","exam":"2要件は超頻出。"},{"num":"105","title":"資格喪失後の死亡に関する給付","importance":"frequent","text":"第百五条　継続給付受給者の死亡、継続給付を受けなくなった日後3月以内の死亡、又は資格喪失後3月以内の死亡の場合に埋葬料を支給。","practical":"資格喪失後の埋葬料。3パターンの死亡時期。","beginner":"退職後でも一定期間内に死亡した場合は埋葬料が支給される。","exam":"3パターンの死亡時期を正確に理解。"},{"num":"106","title":"資格喪失後の出産育児一時金","importance":"important","text":"第百六条　1年以上被保険者であった者が資格喪失後6月以内に出産したときは出産育児一時金を支給。","practical":"要件：1年以上被保険者＋喪失後6月以内の出産。","beginner":"退職後6ヶ月以内の出産でも出産育児一時金がもらえる（1年以上加入が条件）。","exam":"「1年以上」「6月以内」は超頻出。"},{"num":"108","title":"傷病手当金と報酬等との調整","importance":"important","text":"第百八条\n１ 報酬→不支給（差額支給）\n３ 障害厚生年金→不支給（差額支給）\n４ 障害手当金→累計額が障害手当金額に達するまで不支給\n５ 老齢退職年金（資格喪失後）→不支給（差額支給）","practical":"併給調整4段階。報酬・障害厚生年金・障害手当金・老齢退職年金。いずれも差額支給。","beginner":"傷病手当金は給料・年金と調整。少ない場合は差額支給。","exam":"併給調整の各ルールは超頻出。"},{"num":"109","title":"報酬が受けられなかった場合","importance":"basic","text":"第百九条　報酬の全部又は一部を受けられなかった場合は傷病手当金又は出産手当金の全額又は差額を支給。事業主から徴収。","practical":"報酬未払い時の救済規定。保険者が支給した額は事業主から徴収。","beginner":"会社から給料がもらえなかった場合の救済制度。","exam":"事業主からの徴収の仕組みを理解。"}]},{"title":"家族に係る給付（第110条～第114条）","articles":[{"num":"110","title":"家族療養費","importance":"important","text":"第百十条　被扶養者の療養に対し被保険者に支給。給付割合：就学後～70歳前7割、就学前8割、70歳以上一般8割、現役並み7割。","practical":"家族療養費は「被保険者に」支給。自己負担割合は本人と同じ。","beginner":"家族の治療費は被保険者に支給。自己負担は本人と同じ。","exam":"「被保険者に」支給、給付割合は頻出。"},{"num":"111","title":"家族訪問看護療養費","importance":"basic","text":"第百十一条　被扶養者が指定訪問看護を受けたときは被保険者に家族訪問看護療養費を支給。","practical":"被扶養者の訪問看護に対する給付。被保険者に支給。","beginner":"家族が訪問看護を受けた場合の給付。","exam":"訪問看護療養費との対応関係を理解。"},{"num":"112","title":"家族移送費","importance":"basic","text":"第百十二条　被扶養者が移送されたときは被保険者に家族移送費を支給。","practical":"被扶養者の移送に対する給付。","beginner":"家族が病院に搬送された場合の給付。","exam":"移送費との対応関係を理解。"},{"num":"113","title":"家族埋葬料","importance":"frequent","text":"第百十三条　被扶養者が死亡したときは被保険者に5万円支給。","practical":"家族埋葬料5万円。「被保険者に」支給。生計維持要件なし。","beginner":"家族が亡くなったとき被保険者に5万円。","exam":"5万円、埋葬料との違い（生計維持要件なし）を理解。"},{"num":"114","title":"家族出産育児一時金","importance":"frequent","text":"第百十四条　被扶養者が出産したときは被保険者に家族出産育児一時金を支給。","practical":"家族出産育児一時金。金額は出産育児一時金と同じ50万円。","beginner":"家族（被扶養者）が出産したときも50万円支給。","exam":"出産育児一時金と同額。"}]}]},{"id":"high_limit","title":"高額療養費・給付制限","desc":"高額療養費・保険給付の制限（第115条～第122条）","groups":[{"title":"高額療養費（第115条～第115条の2）","articles":[{"num":"115","title":"高額療養費","importance":"important","text":"第百十五条　一部負担金等の額が著しく高額であるときは高額療養費を支給。支給要件・額は政令で定める。","practical":"自己負担限度額は所得・年齢で変動。世帯合算・多数該当（12月間に3回以上→4回目から軽減）の特例あり。","beginner":"1ヶ月の自己負担が一定額を超えたとき、超えた分が戻る制度。","exam":"高額療養費の仕組みは超頻出。自己負担限度額の所得区分を理解。"},{"num":"115の2","title":"高額介護合算療養費","importance":"frequent","text":"第百十五条の二　医療保険と介護保険の自己負担の合算額が著しく高額であるときに支給。","practical":"医療と介護の自己負担の年間合算。世帯単位で計算。","beginner":"医療と介護の自己負担の合計が高額になったときの制度。","exam":"医療＋介護の合算制度を理解。"}]},{"title":"保険給付の制限（第116条～第122条）","articles":[{"num":"116","title":"故意の犯罪行為等","importance":"important","text":"第百十六条　故意の犯罪行為又は故意に給付事由を生じさせた場合は給付しない。","practical":"絶対的給付制限。全額不支給。","beginner":"わざと犯罪やケガをした場合は給付を受けられない。","exam":"絶対的制限は頻出。"},{"num":"117","title":"闘争・泥酔等","importance":"important","text":"第百十七条　闘争、泥酔又は著しい不行跡による場合は全部又は一部を行わないことができる。","practical":"相対的給付制限。「できる」規定（裁量的）。","beginner":"ケンカや泥酔によるケガは、給付の全部又は一部が制限されうる。","exam":"第116条（絶対的）との違いが超頻出。"},{"num":"118","title":"少年院・刑事施設収容","importance":"frequent","text":"第百十八条　少年院等又は刑事施設等に収容されている期間は給付しない（被扶養者の給付は妨げない）。","practical":"収容期間中の給付停止。傷病手当金・出産手当金は省令で定める場合に限り停止。被扶養者の給付は可能。","beginner":"刑務所等にいる期間は原則として給付が止まる。家族の給付は別。","exam":"収容期間の給付停止と被扶養者の給付は出題される。"},{"num":"119","title":"療養に関する指示不従事","importance":"basic","text":"第百十九条　正当な理由なく療養に関する指示に従わないときは給付の一部を行わないことができる。","practical":"医師の指示に従わない場合の一部制限。","beginner":"医師の指示に従わない場合、給付が一部制限されうる。","exam":"一部制限である点を理解。"},{"num":"120","title":"不正受給者に対する制限","importance":"frequent","text":"第百二十条　不正行為により給付を受けた者に対し、6月以内の期間、傷病手当金又は出産手当金の全部又は一部を支給しない決定ができる。","practical":"不正受給者への制裁的制限。6月以内の支給停止。不正行為から1年経過で時効。","beginner":"不正に給付を受けた人は、最長6ヶ月間、手当金の支給が止められる。","exam":"「6月以内」と「1年の時効」を理解。"},{"num":"122","title":"被扶養者への準用","importance":"basic","text":"第百二十二条　第116条～第119条の規定は被扶養者にも準用。","practical":"給付制限規定の被扶養者への準用。","beginner":"給付制限のルールは被扶養者にも同様に適用。","exam":"準用関係を理解。"}]}]},{"id":"daily","title":"日雇特例被保険者","desc":"日雇特例被保険者に関する特例（第123条～第149条）","groups":[{"title":"日雇特例被保険者（第123条～第149条）","articles":[{"num":"123","title":"保険者","importance":"important","text":"第百二十三条　日雇特例被保険者の保険の保険者は協会とする。\n２　日雇特例被保険者手帳の交付・保険料徴収等は厚生労働大臣が行う。","practical":"日雇特例被保険者の保険者は「協会」。手帳交付・保険料徴収は大臣。","beginner":"日雇労働者の健康保険は協会けんぽが運営。","exam":"保険者が「協会」である点は基本。"},{"num":"126","title":"日雇特例被保険者手帳","importance":"frequent","text":"第百二十六条　日雇労働者は日雇特例被保険者となった日から5日以内に手帳の交付を申請。","practical":"手帳の交付申請は「5日以内」。健康保険印紙の貼付で保険料納付。","beginner":"日雇労働者は5日以内に手帳の交付を申請する必要がある。","exam":"「5日以内」の申請期限を理解。"},{"num":"129","title":"療養の給付（受給要件）","importance":"important","text":"第百二十九条　日雇特例被保険者が療養の給付を受けるには、前2月間に26日分以上又は前6月間に78日分以上の保険料納付が必要。","practical":"受給要件：前2月間26日分以上又は前6月間78日分以上。受給資格者票による確認。","beginner":"治療を受けるには、直近の保険料納付が一定日数以上必要。","exam":"「2月間26日」「6月間78日」は頻出。"},{"num":"135","title":"傷病手当金","importance":"frequent","text":"第百三十五条　日雇特例被保険者の傷病手当金は、標準賃金日額の45分の1の額。支給期間は6月（指定疾病は1年6月）。","practical":"支給額は45分の1（一般被保険者は30分の1の2/3）。支給期間は6月（指定疾病1年6月）。","beginner":"日雇の傷病手当金は一般と計算方法が異なる。支給期間も6ヶ月と短い。","exam":"一般被保険者との違い（支給額・支給期間）は頻出。"},{"num":"145","title":"特別療養費","importance":"frequent","text":"第百四十五条　受給要件を満たさない日雇特例被保険者に特別療養費を支給。自己負担3割。","practical":"通常の受給要件を満たさない期間の特別な給付。3割自己負担。3月間の時限的給付。","beginner":"保険料の納付日数が足りない場合でも、一時的に治療を受けられる制度。","exam":"特別療養費の仕組みを理解。"}]}]},{"id":"health","title":"保健事業","desc":"保健事業及び福祉事業（第150条）","groups":[{"title":"保健事業（第150条）","articles":[{"num":"150","title":"保健事業及び福祉事業","importance":"frequent","text":"第百五十条　保険者は、特定健康診査等を行うほか、健康教育・健康相談・健康診査等の保健事業に努めなければならない。福祉事業も行うことができる。","practical":"保健事業（1項・2項）は努力義務。特定健診は義務。福祉事業（3項）は任意。大臣は健保組合に保健事業実施を命じることができる（5項）。","beginner":"保険者は健康診断等の健康づくり事業を行う努力義務がある。","exam":"保健事業の努力義務と特定健診の義務の区別を理解。"}]}]},{"id":"cost","title":"費用の負担","desc":"国庫負担・保険料・保険料率（第151条～第172条）","groups":[{"title":"国庫負担・補助（第151条～第154条の2）","articles":[{"num":"151","title":"国庫負担","importance":"frequent","text":"第百五十一条　国庫は、健康保険事業の事務の執行に要する費用を負担する。","practical":"事務費の国庫負担。保険給付の国庫負担ではない点に注意。","beginner":"国は健康保険の事務費用を負担する。","exam":"事務費の国庫負担は基本。"},{"num":"153","title":"国庫補助（協会）","importance":"important","text":"第百五十三条　国庫は、協会管掌の保険給付費等に千分の百三十から千分の二百までの範囲内で補助。","practical":"協会管掌の国庫補助率：130‰～200‰（16.4%～20%）。健保組合にはこの補助なし。","beginner":"協会けんぽの保険給付には国から13%～20%の補助がある。","exam":"国庫補助率の範囲は頻出。健保組合との違いも重要。"},{"num":"154の2","title":"特定健診等の国庫補助","importance":"basic","text":"第百五十四条の二　国庫は予算の範囲内で、特定健康診査等の費用の一部を補助できる。","practical":"特定健診の国庫補助。予算の範囲内の裁量的補助。","beginner":"特定健康診査の費用には国の補助がある。","exam":"予算の範囲内の補助であることを理解。"}]},{"title":"保険料（第155条～第167条）","articles":[{"num":"155","title":"保険料","importance":"important","text":"第百五十五条　保険者等は保険料を徴収する。\n２　協会管掌の任意継続被保険者の保険料は協会が徴収。","practical":"保険料徴収の根拠。任意継続の保険料は協会が徴収。","beginner":"保険料の徴収は原則厚生労働大臣、任意継続は協会。","exam":"徴収主体の区分は重要。"},{"num":"156","title":"被保険者の保険料額","importance":"important","text":"第百五十六条　介護保険第2号被保険者は一般＋介護保険料額。その他は一般保険料額。\n３　資格喪失月は保険料不算定（前月から継続の場合）。","practical":"40～64歳は介護保険料も。資格喪失月は不算定（同月得喪は1月分徴収）。","beginner":"保険料は毎月計算。40～64歳は介護保険料も。退職月は不要。","exam":"喪失月の不算定、同月得喪は超頻出。"},{"num":"159","title":"育児休業期間中の保険料免除","importance":"important","text":"第百五十九条　育児休業等をしている被保険者の保険料は、事業主の申出により育休開始月から終了月の前月まで免除。","practical":"育休中の保険料免除。開始月～終了日の翌日が属する月の前月まで。事業主の申出が必要。","beginner":"育児休業中は保険料が免除される。","exam":"免除期間の計算は頻出。"},{"num":"159の3","title":"産前産後休業期間中の保険料免除","importance":"important","text":"第百五十九条の三　産前産後休業中の被保険者の保険料は、事業主の申出により免除。","practical":"産休中の保険料免除。育休中と同様の仕組み。","beginner":"産前産後休業中も保険料が免除される。","exam":"育休中の免除との対比で出題。"},{"num":"160","title":"保険料率","importance":"important","text":"第百六十条　一般保険料率は30‰～130‰。協会は都道府県単位で決定。健保組合も同範囲。\n14 特定保険料率と基本保険料率に区分。\n16 介護保険料率の算定。","practical":"保険料率30‰～130‰。都道府県単位保険料率。特定保険料率（高齢者医療費の賦課分）と基本保険料率。","beginner":"保険料率は3%～13%。協会は都道府県ごとに異なる。","exam":"保険料率の範囲は超頻出。"},{"num":"161","title":"保険料の負担及び納付義務","importance":"important","text":"第百六十一条　被保険者・事業主は各2分の1負担。任意継続は全額自己負担。事業主に納付義務。","practical":"労使折半。任意継続は全額。事業主の納付義務。健保組合は事業主負担増加可（第162条）。","beginner":"保険料は会社と従業員で半分ずつ。任意継続は全額自己負担。","exam":"労使折半、任意継続全額は超頻出。"},{"num":"162","title":"健保組合の負担割合の特例","importance":"frequent","text":"第百六十二条　健保組合は規約で事業主の負担割合を増加させることができる。","practical":"事業主の負担割合増加の特例。被保険者の負担を軽減可能。","beginner":"健保組合では、会社が従業員より多く保険料を負担することができる。","exam":"事業主負担の増加（被保険者負担の軽減）は頻出。"},{"num":"164","title":"保険料の納付","importance":"important","text":"第百六十四条　毎月の保険料は翌月末日まで。任意継続は当月10日まで。","practical":"納期限：一般→翌月末日、任意継続→当月10日。","beginner":"保険料の支払期限：通常は翌月末日、任意継続は当月10日。","exam":"保険料の納期限は頻出。"},{"num":"165","title":"任意継続被保険者の保険料の前納","importance":"basic","text":"第百六十五条　任意継続被保険者は将来の一定期間の保険料を前納できる。前納すると割引あり。","practical":"保険料の前納制度。前納により割引。","beginner":"任意継続の保険料はまとめて前払いすると割引される。","exam":"前納制度の存在を理解。"},{"num":"167","title":"保険料の源泉控除","importance":"frequent","text":"第百六十七条　事業主は被保険者の報酬から前月分の保険料を控除できる。退職月は前月分と当月分。","practical":"源泉控除は「前月分」。退職月は2ヶ月分控除可能。通貨払いに限る。","beginner":"会社は給料から前月分の保険料を天引き。退職月は2ヶ月分。","exam":"「前月分」の控除は頻出。"}]},{"title":"日雇特例被保険者の保険料等（第168条～第172条）","articles":[{"num":"168","title":"日雇特例被保険者の保険料額","importance":"basic","text":"第百六十八条　日雇特例被保険者の保険料額は、標準賃金日額等級に応じて政令で定める。健康保険印紙で納付。","practical":"日雇の保険料は標準賃金日額に基づき計算。印紙で納付する特殊な方式。","beginner":"日雇労働者の保険料は、日額に応じた印紙を手帳に貼って納付。","exam":"印紙方式の仕組みを理解。"},{"num":"172","title":"保険料の繰上徴収","importance":"basic","text":"第百七十二条　滞納処分・強制執行・破産等の場合は納期前に全額徴収可能。","practical":"繰上徴収の5事由。国税等の滞納処分、強制執行、破産等。","beginner":"特別な事情がある場合は、期限前に保険料を全額徴収できる。","exam":"繰上徴収の事由を理解。"}]}]},{"id":"appeal","title":"不服申立て・罰則","desc":"審査請求・再審査請求・罰則（第189条～第222条）","groups":[{"title":"不服申立て（第189条～第192条）","articles":[{"num":"189","title":"審査請求（資格・給付）","importance":"important","text":"第百八十九条　資格・標準報酬・保険給付の処分に不服→社会保険審査官に審査請求→不服なら社会保険審査会に再審査請求。2月以内に決定なければみなし棄却。","practical":"二審制：審査官→審査会。審査請求前置主義。2月のみなし棄却。","beginner":"不服申立て：①社会保険審査官→②社会保険審査会。","exam":"二審制の仕組みは頻出。"},{"num":"190","title":"審査請求（保険料等）","importance":"important","text":"第百九十条　保険料等の賦課・徴収の処分に不服がある者は、社会保険審査会に対して審査請求ができる。","practical":"保険料等の処分は審査会への一審制。審査官を経由しない。","beginner":"保険料に関する不服は社会保険審査会に直接申立て。","exam":"資格・給付（二審制）と保険料（一審制）の違いは超頻出。"},{"num":"192","title":"時効","importance":"important","text":"第百九十二条　保険料等を徴収する権利は2年で時効消滅。保険給付を受ける権利も2年で時効消滅。","practical":"保険料の徴収権：2年。保険給付の受給権：2年。起算日に注意。","beginner":"保険料の請求も保険給付の請求も、2年で時効になります。","exam":"「2年」の時効は頻出。起算日を正確に理解。"}]},{"title":"雑則・罰則（第193条～第222条）","articles":[{"num":"193","title":"戸籍に関する届出等の報告","importance":"basic","text":"第百九十三条　市町村長は、保険者等に対し戸籍に関する届出等の情報を報告しなければならない。","practical":"戸籍情報の報告義務。死亡・出生等の情報提供。","beginner":"市町村は戸籍の届出情報を保険者に報告する義務がある。","exam":"基本事項。"},{"num":"197","title":"届出等","importance":"basic","text":"第百九十七条　保険医療機関等は保険者に対し必要な届出をしなければならない。","practical":"保険医療機関の届出義務。","beginner":"医療機関は保険者に届出をする義務がある。","exam":"基本事項。"},{"num":"200","title":"権限の委任","importance":"frequent","text":"第二百条　厚生労働大臣の権限の一部は、日本年金機構に委任される。","practical":"大臣の権限の日本年金機構への委任規定。適用・徴収業務等。","beginner":"厚生労働大臣の仕事の一部は日本年金機構が代行します。","exam":"年金機構への委任の範囲を理解。"},{"num":"207の2","title":"秘密漏洩の罪","importance":"frequent","text":"第二百七条の二　秘密保持義務違反は1年以下の懲役又は100万円以下の罰金。","practical":"秘密漏洩の罰則。1年以下の懲役又は100万円以下の罰金。","beginner":"秘密を漏らした場合は1年以下の懲役又は100万円以下の罰金。","exam":"罰則の内容を理解。"},{"num":"208","title":"届出義務違反","importance":"basic","text":"第二百八条　事業主が正当な理由なく届出をせず又は虚偽の届出をしたときは、6月以下の懲役又は50万円以下の罰金。","practical":"事業主の届出義務違反の罰則。","beginner":"届出をしない事業主は6ヶ月以下の懲役又は50万円以下の罰金。","exam":"罰則の内容を理解。"}]}]}];
function getEgovUrl(){return'https://laws.e-gov.go.jp/law/211AC0000000070';}
function getEgovApiUrl(n){return'https://laws.e-gov.go.jp/api/1/articles;lawId=211AC0000000070;article='+n;}
let currentFlow=D[0].id,openGroups={},openArticles={},searchQuery='';
function getImportanceBadge(i){switch(i){case'important':return{text:'重要',class:'badge-important'};case'frequent':return{text:'頻出',class:'badge-frequent'};default:return{text:'基本',class:'badge-basic'};}}
function matchSearch(a){if(!searchQuery)return true;const q=searchQuery.toLowerCase();return a.title.toLowerCase().includes(q)||a.text.toLowerCase().includes(q)||a.practical.toLowerCase().includes(q)||a.beginner.toLowerCase().includes(q)||(a.exam&&a.exam.toLowerCase().includes(q));}
function renderNavTabs(){document.getElementById('navTabs').innerHTML=D.map(s=>`<div class="nav-item ${currentFlow===s.id?'active':''}" onclick="setFlow('${s.id}')">${s.title}</div>`).join('');}
function renderContent(){const el=document.getElementById('mainContent');let html='',n=0;const s=D.find(s=>s.id===currentFlow);if(!s)return;
html+=`<div class="flow-section"><div class="flow-header"><div class="flow-title">${s.title}</div><div class="flow-desc">${s.desc}</div></div>`;
s.groups.forEach((g,gi)=>{const gk=`${currentFlow}-${gi}`;const v=g.articles.filter(matchSearch);if(!v.length)return;
html+=`<div class="art-group ${openGroups[gk]?'open':''}" id="group-${gk}"><div class="art-group-header" onclick="toggleGroup('${gk}')"><div class="art-group-title">${g.title}</div><div style="display:flex;align-items:center;gap:8px"><span class="art-group-count">${v.length}条</span><span class="art-group-arrow">▶</span></div></div><div class="art-group-body">`;
v.forEach(a=>{const ak=`${gk}-${a.num}`;const o=openArticles[ak];const b=getImportanceBadge(a.importance);n++;
html+=`<div class="art-item ${o?'open':''}" id="article-${ak}"><div class="art-header" onclick="toggleArticle('${ak}')"><div class="art-num">第${a.num}条</div><div class="art-title-text">${a.title}<span class="art-badge ${b.class}">${b.text}</span></div><span class="art-arrow">▶</span></div>`;
if(o){html+=`<div class="art-detail"><div class="art-text"><div class="art-text-header"><div class="art-text-title">📋 条文</div><div class="art-links"><a href="${getEgovApiUrl(a.num)}" target="_blank" class="api-link">API取得</a><a href="${getEgovUrl()}" target="_blank" class="egov-link">e-Gov</a></div></div><div class="art-text-body">${a.text}</div></div><div class="explanations"><div class="exp-item exp-practical"><div class="exp-header">📘 実務・試験向け解説</div><div class="exp-body">${a.practical.replace(/\n/g,'<br>')}</div></div><div class="exp-item exp-beginner"><div class="exp-header">🌱 初学者向け解説</div><div class="exp-body">${a.beginner.replace(/\n/g,'<br>')}</div></div>${a.exam?`<div class="exp-item exp-exam"><div class="exp-header">🎯 試験対策ポイント</div><div class="exp-body">${a.exam.replace(/\n/g,'<br>')}</div></div>`:''}</div></div>`;}
html+=`</div>`;});html+=`</div></div>`;});html+=`</div>`;
if(!n)html=`<div class="no-results">🔍 「${searchQuery}」に一致する条文が見つかりませんでした。</div>`;
el.innerHTML=html;document.getElementById('searchCount').textContent=searchQuery?`${n}件の条文が見つかりました`:'';}
function setFlow(id){currentFlow=id;openGroups={};openArticles={};renderNavTabs();renderContent();window.scrollTo(0,0);}
function toggleGroup(gk){openGroups[gk]=!openGroups[gk];if(!openGroups[gk])Object.keys(openArticles).forEach(k=>{if(k.startsWith(gk))delete openArticles[k];});renderContent();}
function toggleArticle(ak){const w=openArticles[ak];openArticles={};if(!w)openArticles[ak]=true;renderContent();if(!w)setTimeout(()=>{const e=document.getElementById('article-'+ak);if(e)e.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function doSearch(){searchQuery=document.getElementById('searchInput').value.trim();openGroups={};openArticles={};renderContent();}
renderNavTabs();renderContent();</script>
</body>
</html>
