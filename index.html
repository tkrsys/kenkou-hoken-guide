.art-detail{display:none;padding:0 1.5rem 20px 80px;background:var(--bg);}.art-item.open .art-detail{display:block;}.art-text{background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}.art-text-header{padding:12px 16px;background:var(--orange-bg);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}.art-text-title{font-size:13px;font-weight:600;color:var(--orange-text);}.art-links{display:flex;gap:6px;}.egov-link,.api-link{font-size:11px;padding:4px 8px;border-radius:4px;text-decoration:none;transition:all .2s;color:white;}.egov-link{background:var(--blue);}.egov-link:hover{background:#1e40af;}.api-link{background:var(--orange);}.api-link:hover{background:var(--orange-dark);}.art-text-body{padding:16px;font-family:'Hiragino Mincho ProN','Yu Mincho','serif';font-size:13px;line-height:1.8;white-space:pre-line;color:var(--text);}
.explanations{display:flex;flex-direction:column;gap:12px;}.exp-item{border-radius:var(--rsm);border:1px solid var(--border);overflow:hidden;}.exp-header{padding:10px 14px;font-size:11px;font-weight:600;}.exp-body{padding:14px;font-size:13px;line-height:1.7;}.exp-practical{background:var(--surface);}.exp-practical .exp-header{background:var(--orange-bg);color:var(--orange-text);}.exp-beginner{background:var(--teal-bg);}.exp-beginner .exp-header{color:var(--teal-text);}.exp-exam{background:var(--amber-bg);}.exp-exam .exp-header{color:var(--amber-text);}
.no-results{padding:4rem 2rem;text-align:center;color:var(--text3);font-size:15px;}.footer{margin-top:3rem;padding:2rem 1.25rem;border-top:1px solid var(--border);background:var(--bg2);text-align:center;}.footer-content{max-width:1200px;margin:0 auto;font-size:12px;color:var(--text3);line-height:1.6;}

<script>
const D=[{id:"overview",title:"総則",desc:"目的・基本的理念・定義（第1条～第3条）",groups:[{title:"総則（第1条～第3条）",articles:[{num:"1",title:"目的",importance:"important",text:"（目的）\n第一条　この法律は、労働者又はその被扶養者の業務災害（労働者災害補償保険法第7条第1項第1号に規定する業務災害をいう。）以外の疾病、負傷若しくは死亡又は出産に関して保険給付を行い、もって国民の生活の安定と福祉の向上に寄与することを目的とする。",practical:"健康保険法の根幹を成す目的規定。業務災害以外の疾病・負傷・死亡・出産に対する保険給付が対象。業務災害は労災保険法の管轄。「国民の生活の安定と福祉の向上」が究極目的。",beginner:"健康保険法は、会社で働く人やその家族が、仕事以外のケガや病気、死亡、出産をした場合に保険で治療費等を保障する法律です。\n\n仕事中のケガ→労災保険\n仕事以外のケガ→健康保険",exam:"「業務災害以外」が対象である点は超頻出。目的条文の穴埋め問題に注意。労災保険法との守備範囲の違いを正確に理解すること。"},{num:"2",title:"基本的理念",importance:"frequent",text:"（基本的理念）\n第二条　健康保険制度については、これが医療保険制度の基本をなすものであることにかんがみ、高齢化の進展、疾病構造の変化、社会経済情勢の変化等に対応し、その他の医療保険制度及び後期高齢者医療制度並びにこれらに密接に関連する制度と併せてその在り方に関して常に検討が加えられ、その結果に基づき、医療保険の運営の効率化、給付の内容及び費用の負担の適正化並びに国民が受ける医療の質の向上を総合的に図りつつ、実施されなければならない。",practical:"平成14年改正で新設。健康保険が「医療保険制度の基本」であることを宣言。運営の効率化・給付と負担の適正化・医療の質の向上の3つを総合的に図ることを要請。",beginner:"健康保険は日本の医療保険の中心的な制度です。社会の変化に合わせて常に見直しを行い、効率的な運営、適切な給付と負担、医療の質の向上を同時に実現していくべきという理念です。",exam:"「医療保険制度の基本」というキーワード、3つの目標（効率化・適正化・質の向上）を総合的に図る点が出題ポイント。"},{num:"3",title:"定義",importance:"important",text:"（定義）\n第三条　この法律において「被保険者」とは、適用事業所に使用される者及び任意継続被保険者をいう。ただし、次の各号のいずれかに該当する者は、日雇特例被保険者となる場合を除き、被保険者となることができない。\n一　船員保険の被保険者\n二　臨時に使用される者\n三　所在地が一定しない事業所に使用される者\n四　季節的業務に使用される者（継続して4月超を除く）\n五　臨時的事業の事業所に使用される者（継続して6月超を除く）\n六　国民健康保険組合の事業所に使用される者\n七　後期高齢者医療の被保険者等\n八　厚生労働大臣等の承認を受けた者\n九　短時間労働者の適用除外要件\n\n３ 適用事業所：法定16業種で常時5人以上、又は国・地方公共団体・法人の事業所\n４ 任意継続被保険者：資格喪失日の前日まで継続して2月以上被保険者であった者\n５ 報酬：労働の対償。臨時・3月超期間ごとのものを除く\n６ 賞与：3月を超える期間ごとに受けるもの\n７ 被扶養者：直系尊属・配偶者・子・孫・兄弟姉妹で生計維持されるもの等",practical:"健康保険法の中核的定義規定。被保険者の適用除外9号、適用事業所の範囲（法定16業種・5人以上）、任意継続被保険者の要件（継続2月以上）、報酬と賞与の区分（3月超基準）、被扶養者の範囲が極めて重要。",beginner:"・被保険者：会社に勤める人と任意継続の人\n・適用事業所：法定業種で5人以上の個人事業所、法人の事業所\n・任意継続：退職後も2年間加入可（退職前2月以上加入が条件）\n・報酬：毎月の給料　・賞与：年3回以下のボーナス\n・被扶養者：被保険者に養われている家族",exam:"超頻出。適用除外の9号、任意継続の「2月以上」、報酬と賞与の区分（3月超基準）、被扶養者の同居要件の有無を完全暗記。"}]}]},{id:"insurer",title:"保険者",desc:"全国健康保険協会・健康保険組合（第4条～第30条）",groups:[{title:"保険者の通則（第4条～第7条）",articles:[{num:"4",title:"保険者",importance:"important",text:"（保険者）\n第四条　健康保険（日雇特例被保険者の保険を除く。）の保険者は、全国健康保険協会及び健康保険組合とする。",practical:"健康保険の保険者は「協会けんぽ」と「健保組合」の2種類。日雇特例被保険者の保険は別扱い（第123条で協会が保険者）。",beginner:"保険者は2つ：①全国健康保険協会（協会けんぽ）：中小企業\n②健康保険組合（健保組合）：大企業",exam:"保険者が2つである点は基本。日雇特例被保険者の保険者は協会（第123条）。"},{num:"5",title:"全国健康保険協会管掌健康保険",importance:"important",text:"第五条　全国健康保険協会は、健康保険組合の組合員でない被保険者の保険を管掌する。\n２　資格の取得・喪失の確認、標準報酬月額・標準賞与額の決定、保険料の徴収（任意継続被保険者分を除く）は厚生労働大臣が行う。",practical:"協会けんぽの管掌範囲と業務分担。資格・標準報酬・保険料徴収は厚生労働大臣が行い、保険給付・保健事業は協会が行う。任意継続の保険料徴収は協会。",beginner:"協会けんぽは健保組合に入っていない会社員の保険を運営。資格管理や保険料徴収は厚生労働大臣（日本年金機構）が行います。",exam:"第2項の業務分担は頻出。任意継続の保険料徴収は「協会」。"}]},{title:"健康保険組合（第8条～第30条）",articles:[{num:"11",title:"設立",importance:"frequent",text:"第十一条　一又は二以上の適用事業所について常時政令で定める数以上の被保険者を使用する事業主は、健康保険組合を設立できる。\n２　共同設立も可能。被保険者数は合算して常時政令で定める数以上。",practical:"単独設立：常時700人以上、共同設立：合算で常時3,000人以上。",beginner:"健保組合の設立要件：1社で700人以上、または複数社で合計3,000人以上の従業員が必要。",exam:"設立の被保険者数要件（単独700人以上・共同3,000人以上）は頻出。"},{num:"26",title:"解散",importance:"frequent",text:"第二十六条　健康保険組合は、次の理由により解散する。\n一　組合会議員の定数の四分の三以上の多数による議決\n二　事業の継続の不能\n三　解散の命令\n４　協会は、解散した健保組合の権利義務を承継する。",practical:"解散事由は3つ。組合会議決は4分の3以上。解散後の権利義務は協会が承継。",beginner:"健保組合の解散：①4分の3以上の議決、②事業継続不能、③大臣の命令。解散後は協会けんぽが引継ぎ。",exam:"「4分の3以上」の特別多数決、権利義務は「協会」が承継は頻出。"}]}]},{id:"insured",title:"被保険者",desc:"資格・標準報酬月額・届出等（第31条～第51条の2）",groups:[{title:"資格（第35条～第39条）",articles:[{num:"35",title:"資格取得の時期",importance:"important",text:"第三十五条　被保険者は、適用事業所に使用されるに至った日等から、被保険者の資格を取得する。",practical:"資格取得は3パターン：①使用された日、②事業所が適用事業所になった日、③適用除外でなくなった日。いずれも「当日」。",beginner:"被保険者の資格取得は、入社した日等の当日から。",exam:"資格取得は「当日」。3つの取得パターンを正確に。"},{num:"36",title:"資格喪失の時期",importance:"important",text:"第三十六条　被保険者は、次の各号に該当した日の翌日（同日再取得なら当日）から資格を喪失する。\n一 死亡　二 退職　三 適用除外該当　四 任意適用取消し",practical:"資格喪失は原則「翌日」。同日再取得なら「当日」。4つの喪失事由。",beginner:"資格喪失は、死亡・退職等の翌日。同じ日に別の会社に入ればその日に喪失。",exam:"喪失は「翌日」、同日再取得なら「当日」は超頻出。"},{num:"37",title:"任意継続被保険者",importance:"important",text:"第三十七条　申出は資格喪失日から20日以内。正当理由があれば期間経過後も受理可。\n２　初めて納付すべき保険料を納付期日までに納付しなかったときは、任意継続被保険者とならなかったものとみなす。",practical:"申出期限「20日以内」。正当理由による期間経過後受理。初回保険料未納は資格取得否定。",beginner:"退職後20日以内に申し出が必要。最初の保険料を払わないと加入不可。",exam:"「20日以内」、正当理由による受理、初回保険料未納の効果は超頻出。"},{num:"38",title:"任意継続被保険者の資格喪失",importance:"important",text:"第三十八条　次の各号に該当した日の翌日（4号～6号は当日）から喪失。\n一 2年経過　二 死亡　三 保険料未納　四 被保険者となった　五 船員保険加入　六 後期高齢者医療加入",practical:"喪失事由6つ。1～3号は「翌日」、4～6号は「当日」。",beginner:"任意継続の終了：①2年経過、②死亡、③保険料未納、④再就職、⑤船員保険加入、⑥後期高齢者医療加入。",exam:"6つの喪失事由と「翌日/当日」の区分は超頻出。"},{num:"39",title:"資格の得喪の確認",importance:"important",text:"第三十九条　資格の取得・喪失は、保険者等の確認によって効力を生ずる。ただし、任意適用取消しによる喪失及び任意継続の得喪は除く。",practical:"「確認」が効力発生要件。確認不要の例外あり。確認は届出・請求・職権で実施。",beginner:"資格の取得・喪失は保険者等の確認で効力発生。任意継続の場合は確認不要。",exam:"「確認」が効力発生要件、確認不要の例外は頻出。"}]},{title:"標準報酬月額（第40条～第47条）",articles:[{num:"40",title:"標準報酬月額",importance:"important",text:"第四十条　標準報酬月額は第1級58,000円～第50級1,390,000円の50等級。\n２　最高等級が1.5%超で等級追加可能（0.5%下限）。",practical:"50等級・上限1,390,000円。厚生年金（32等級・650,000円）との違いに注意。",beginner:"標準報酬月額は50段階。最低58,000円～最高1,390,000円。",exam:"50等級・上限1,390,000円は超頻出。厚生年金との比較が出る。"},{num:"41",title:"定時決定",importance:"important",text:"第四十一条　毎年7月1日現在で、同日前3月間の報酬の平均で標準報酬月額を決定。\n２　9月から翌年8月まで適用。\n３　6/1～7/1取得者等はその年不適用。",practical:"定時決定：7月1日現在で4～6月報酬を基に決定。9月～翌8月適用。17日未満の月は除外。",beginner:"毎年4～6月の給料平均で標準報酬月額を決め直し、9月から翌8月まで使用。",exam:"「7月1日」「4～6月」「9月～翌8月」「17日未満除外」は超頻出。"},{num:"43",title:"随時改定",importance:"important",text:"第四十三条　継続3月間（各月17日以上）の報酬が著しく高低を生じた場合に改定可能。",practical:"随時改定3要件：①固定的賃金変動、②3月連続17日以上、③2等級以上差。",beginner:"給料が大きく変わった場合（2等級以上差）に標準報酬月額を変更。",exam:"随時改定の3要件は超頻出。"},{num:"45",title:"標準賞与額の決定",importance:"important",text:"第四十五条　賞与額の1000円未満切捨て。年度累計573万円上限。",practical:"1000円未満切捨て。年度（4月～翌3月）累計上限573万円。厚生年金は月150万円上限。",beginner:"ボーナスの1000円未満を切捨てた額。年間合計573万円まで。",exam:"年度累計「573万円」は超頻出。厚生年金の月額150万円上限との違い。"},{num:"47",title:"任意継続被保険者の標準報酬月額",importance:"frequent",text:"第四十七条　①退職時の標準報酬月額と②全被保険者平均額のいずれか少ない額。",practical:"2つの額の「いずれか少ない額」。健保組合は規約で別に定めること可能。",beginner:"任意継続の標準報酬月額は、退職時の額と全加入者の平均額の低い方。",exam:"「いずれか少ない額」は頻出。"}]}]},{id:"benefit",title:"保険給付 通則",desc:"給付の種類・受給権の保護（第52条～第62条）",groups:[{title:"通則（第52条～第62条）",articles:[{num:"52",title:"保険給付の種類",importance:"important",text:"第五十二条　保険給付は次の9種類。\n一 療養の給付等　二 傷病手当金　三 埋葬料　四 出産育児一時金　五 出産手当金\n六 家族療養費等　七 家族埋葬料　八 家族出産育児一時金　九 高額療養費等",practical:"保険給付は9種類。本人給付と被扶養者給付の対応関係が重要。",beginner:"9種類の保険給付：治療、傷病手当金、埋葬料、出産育児一時金、出産手当金、家族療養費等、家族埋葬料、家族出産育児一時金、高額療養費。",exam:"9種類の保険給付を正確に暗記。"},{num:"61",title:"受給権の保護",importance:"frequent",text:"第六十一条　保険給付を受ける権利は、譲り渡し、担保に供し、又は差し押さえることができない。",practical:"受給権の譲渡・担保・差押えの禁止。",beginner:"保険給付の権利は譲渡・担保・差押え不可。",exam:"3つの禁止を理解。"}]}]},{id:"medical",title:"療養の給付等",desc:"療養の給付・一部負担金（第63条～第97条）",groups:[{title:"療養の給付（第63条～第76条）",articles:[{num:"63",title:"療養の給付",importance:"important",text:"第六十三条　被保険者の疾病又は負傷に関し、次の療養の給付を行う。\n一 診察　二 薬剤又は治療材料の支給　三 処置、手術その他の治療\n四 居宅における療養上の管理等　五 入院及びその療養に伴う世話等",practical:"療養の給付は現物給付5種類。給付に含まれない5種類（食事・生活・評価・患者申出・選定療養）との区別が重要。",beginner:"治療として5種類が保険で受けられます。食事代、先進医療、差額ベッド等は別の仕組み。",exam:"5種類の給付内容と、含まれない5つの療養の区別は超頻出。"},{num:"74",title:"一部負担金",importance:"important",text:"第七十四条\n一 70歳以前：百分の三十\n二 70歳以後（一般）：百分の二十\n三 70歳以後（現役並み所得）：百分の三十",practical:"一部負担金：70歳未満→3割、70歳以上一般→2割、現役並み→3割。就学前は2割。",beginner:"自己負担：70歳未満3割、70歳以上一般2割、高収入3割。小学校前は2割。",exam:"一部負担金の割合は超頻出。「70歳に達する日の属する月」の翌月から変更。"}]}]},{id:"cash",title:"傷病手当金等",desc:"傷病手当金・出産手当金・埋葬料（第99条～第114条）",groups:[{title:"現金給付（第99条～第108条）",articles:[{num:"99",title:"傷病手当金",importance:"important",text:"第九十九条　被保険者（任意継続除く）が療養のため労務不能のとき、3日経過後から傷病手当金を支給。\n２ 額：直近12月の標準報酬月額平均÷30×2/3\n４ 支給期間：通算1年6月",practical:"要件：①療養のため②労務不能③待期3日完成。支給額＝標準報酬日額の2/3。通算1年6月。任意継続は対象外。",beginner:"病気やケガで休んだとき、4日目から給料の約2/3が支給。通算1年6ヶ月まで。",exam:"待期3日（連続）、支給額計算、通算1年6月、任意継続除外を完全暗記。"},{num:"100",title:"埋葬料",importance:"important",text:"第百条　被保険者死亡時、生計維持者で埋葬を行う者に5万円支給。該当者なければ埋葬を行った者に5万円以内の実費。",practical:"埋葬料5万円。「生計維持＋埋葬を行う者」に支給。該当者不在時は実費（5万円上限）。",beginner:"被保険者死亡時に5万円。受取人がいなければ埋葬した人に実費（5万円まで）。",exam:"埋葬料5万円、支給対象者の区別は頻出。"},{num:"101",title:"出産育児一時金",importance:"important",text:"第百一条　被保険者が出産したときは、出産育児一時金として政令で定める金額を支給する。",practical:"出産育児一時金50万円。直接支払制度あり。資格喪失後6月以内の出産にも支給（第106条）。",beginner:"出産時に50万円支給。多くの場合、病院に直接支払い。",exam:"50万円、資格喪失後6月以内の出産（第106条）も重要。"},{num:"102",title:"出産手当金",importance:"important",text:"第百二条　出産日以前42日（多胎98日）から出産日後56日の間の労務不能期間に支給。額は傷病手当金と同様。",practical:"支給期間：産前42日（多胎98日）＋産後56日。支給額＝標準報酬日額の2/3。予定日超過は予定日から起算。",beginner:"産前42日（双子以上98日）＋産後56日。金額は給料の約2/3。",exam:"「42日」「98日」「56日」は超頻出。予定日超過の計算も重要。"},{num:"104",title:"継続給付",importance:"important",text:"第百四条　資格喪失日の前日まで引き続き1年以上被保険者であった者で、喪失時に傷病手当金又は出産手当金を受給中の者は継続給付可。",practical:"要件：①継続1年以上被保険者②喪失時受給中。任意継続期間は含まない。同一保険者から。",beginner:"退職前1年以上加入し、退職時に傷病手当金等を受給中なら引き続き受給可。",exam:"「引き続き1年以上」「喪失時受給中」の2要件は超頻出。"},{num:"108",title:"傷病手当金と報酬等との調整",importance:"important",text:"第百八条\n１ 報酬を受けられる者→傷病手当金不支給（差額あれば支給）\n３ 障害厚生年金→傷病手当金不支給（差額あれば支給）\n５ 老齢退職年金（資格喪失後）→傷病手当金不支給（差額あれば支給）",practical:"併給調整3段階：①報酬②障害厚生年金③老齢退職年金（資格喪失後のみ）。いずれも差額支給。",beginner:"傷病手当金は、給料・障害年金・老齢年金と調整（少ない場合は差額支給）。",exam:"併給調整は超頻出。各調整ルールと差額支給の計算を正確に。"}]},{title:"家族給付（第110条～第114条）",articles:[{num:"110",title:"家族療養費",importance:"important",text:"第百十条　被扶養者の療養に対し、被保険者に家族療養費を支給。\n給付割合：就学後～70歳前7割、就学前8割、70歳以上一般8割、現役並み7割。",practical:"家族療養費は被扶養者の療養に対する給付。「被保険者に」支給される。自己負担割合は本人と同じ。",beginner:"家族の治療費は家族療養費として被保険者に支給。自己負担は本人と同じ。",exam:"「被保険者に」支給される点、給付割合は頻出。"}]}]},{id:"cost",title:"費用の負担",desc:"保険料・保険料率（第155条～第167条）",groups:[{title:"保険料（第155条～第167条）",articles:[{num:"156",title:"被保険者の保険料額",importance:"important",text:"第百五十六条　保険料額は各月につき、介護保険第2号被保険者は一般＋介護保険料額、その他は一般保険料額。\n３ 資格喪失月は保険料不算定（前月から継続の場合）。",practical:"40歳以上65歳未満は介護保険料も負担。資格喪失月は保険料不算定（同月得喪は1月分徴収）。",beginner:"保険料は毎月計算。40～64歳は介護保険料も。退職月は保険料不要（ただし同月入退社は1月分必要）。",exam:"資格喪失月の不算定（第3項）、同月得喪は超頻出。"},{num:"160",title:"保険料率",importance:"important",text:"第百六十条　一般保険料率は千分の三十～千分の百三十。協会は都道府県単位で決定。健保組合も同範囲。",practical:"保険料率30‰～130‰。協会は都道府県単位保険料率。特定保険料率と基本保険料率に区分。",beginner:"保険料率は3%～13%。協会けんぽは都道府県ごとに異なる。",exam:"保険料率の範囲（30‰～130‰）は超頻出。"},{num:"161",title:"保険料の負担及び納付義務",importance:"important",text:"第百六十一条　被保険者・事業主は各2分の1負担。任意継続は全額自己負担。事業主に納付義務。",practical:"労使折半。任意継続は全額自己負担。事業主が被保険者分も含め納付義務。健保組合は事業主負担増加可（第162条）。",beginner:"保険料は会社と従業員で半分ずつ。任意継続は全額自己負担。",exam:"労使折半、任意継続全額負担、事業主の納付義務は超頻出。"},{num:"164",title:"保険料の納付",importance:"frequent",text:"第百六十四条　毎月の保険料は翌月末日まで。任意継続は当月10日まで。",practical:"納期限：一般→翌月末日、任意継続→当月10日（初回は保険者指定日）。",beginner:"保険料の支払期限：通常は翌月末日、任意継続は当月10日。",exam:"保険料の納期限は頻出。"}]}]},{id:"appeal",title:"不服申立て",desc:"審査請求・罰則（第189条～第222条）",groups:[{title:"不服申立て（第189条～第208条）",articles:[{num:"189",title:"審査請求",importance:"important",text:"第百八十九条　資格・標準報酬・保険給付の処分に不服→社会保険審査官に審査請求→不服なら社会保険審査会に再審査請求。\n２ 2月以内に決定なければみなし棄却。",practical:"二審制：審査官→審査会。保険料の処分は審査会のみ（第190条）。審査請求前置主義。",beginner:"不服申立て：①社会保険審査官→②社会保険審査会の順番。",exam:"二審制、保険料は審査会のみ（第190条）、2月のみなし棄却は頻出。"}]}]}];
function getEgovUrl(){return'https://laws.e-gov.go.jp/law/211AC0000000070';}
function getEgovApiUrl(n){return'https://laws.e-gov.go.jp/api/1/articles;lawId=211AC0000000070;article='+n;}
let currentFlow=D[0].id,openGroups={},openArticles={},searchQuery='';
function getImportanceBadge(i){switch(i){case'important':return{text:'重要',class:'badge-important'};case'frequent':return{text:'頻出',class:'badge-frequent'};default:return{text:'基本',class:'badge-basic'};}}
function matchSearch(a){if(!searchQuery)return true;const q=searchQuery.toLowerCase();return a.title.toLowerCase().includes(q)||a.text.toLowerCase().includes(q)||a.practical.toLowerCase().includes(q)||a.beginner.toLowerCase().includes(q)||(a.exam&&a.exam.toLowerCase().includes(q));}
function renderNavTabs(){document.getElementById('navTabs').innerHTML=D.map(s=>`<div class="nav-item ${currentFlow===s.id?'active':''}" onclick="setFlow('${s.id}')">${s.title}</div>`).join('');}
function renderContent(){const el=document.getElementById('mainContent');let html='',n=0;const s=D.find(s=>s.id===currentFlow);if(!s)return;
html+=`<div class="flow-section"><div class="flow-header"><div class="flow-title">${s.title}</div><div class="flow-desc">${s.desc}</div></div>`;
s.groups.forEach((g,gi)=>{const gk=`${currentFlow}-${gi}`;const v=g.articles.filter(matchSearch);if(!v.length)return;
html+=`<div class="art-group ${openGroups[gk]?'open':''}" id="group-${gk}"><div class="art-group-header" onclick="toggleGroup('${gk}')"><div class="art-group-title">${g.title}</div><div style="display:flex;align-items:center;gap:8px"><span class="art-group-count">${v.length}条</span><span class="art-group-arrow">▶</span></div></div><div class="art-group-body">`;
v.forEach(a=>{const ak=`${gk}-${a.num}`;const o=openArticles[ak];const b=getImportanceBadge(a.importance);n++;
html+=`<div class="art-item ${o?'open':''}" id="article-${ak}"><div class="art-header" onclick="toggleArticle('${ak}')"><div class="art-num">第${a.num}条</div><div class="art-title-text">${a.title}<span class="art-badge ${b.class}">${b.text}</span></div><span class="art-arrow">▶</span></div>`;
if(o){html+=`<div class="art-detail"><div class="art-text"><div class="art-text-header"><div class="art-text-title">📋 条文</div><div class="art-links"><a href="${getEgovApiUrl(a.num)}" target="_blank" class="api-link">API取得</a><a href="${getEgovUrl()}" target="_blank" class="egov-link">e-Gov</a></div></div><div class="art-text-body">${a.text}</div></div><div class="explanations"><div class="exp-item exp-practical"><div class="exp-header">📘 実務・試験向け解説</div><div class="exp-body">${a.practical.replace(/\n/g,'<br>')}</div></div><div class="exp-item exp-beginner"><div class="exp-header">🌱 初学者向け解説</div><div class="exp-body">${a.beginner.replace(/\n/g,'<br>')}</div></div>${a.exam?`<div class="exp-item exp-exam"><div class="exp-header">🎯 試験対策ポイント</div><div class="exp-body">${a.exam.replace(/\n/g,'<br>')}</div></div>`:''}</div></div>`;}
html+=`</div>`;});html+=`</div></div>`;});html+=`</div>`;
if(!n)html=`<div class="no-results">🔍 「${searchQuery}」に一致する条文が見つかりませんでした。</div>`;
el.innerHTML=html;document.getElementById('searchCount').textContent=searchQuery?`${n}件の条文が見つかりました`:'';}
function setFlow(id){currentFlow=id;openGroups={};openArticles={};renderNavTabs();renderContent();window.scrollTo(0,0);}
function toggleGroup(gk){openGroups[gk]=!openGroups[gk];if(!openGroups[gk])Object.keys(openArticles).forEach(k=>{if(k.startsWith(gk))delete openArticles[k];});renderContent();}
function toggleArticle(ak){const w=openArticles[ak];openArticles={};if(!w)openArticles[ak]=true;renderContent();if(!w)setTimeout(()=>{const e=document.getElementById('article-'+ak);if(e)e.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function doSearch(){searchQuery=document.getElementById('searchInput').value.trim();openGroups={};openArticles={};renderContent();}
renderNavTabs();renderContent();
</script>
</body>
</html>
